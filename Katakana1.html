<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katakana Reading Practice-OHAYO CENTER</title>
  <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" sizes="192x192" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
<style>
  /* --- ナビゲーションバー --- */
  nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 0 5%; height: 70px; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); font-family: 'Noto Sans JP', sans-serif; box-sizing: border-box; }
  .logo { font-family: 'Sawarabi Mincho', serif; font-weight: bold; font-size: 1.2rem; white-space: nowrap; }
  .logo a { text-decoration: none; color: #2c3e50; }
  .nav-links { list-style: none; display: flex; gap: 1.2rem; margin: 0; padding: 0; }
  .nav-links a { text-decoration: none; color: #2c3e50; font-weight: 500; font-size: 0.8rem; letter-spacing: 1px; }
  @media (max-width: 600px) { nav { padding: 0 15px; } .logo { font-size: 1rem; } .nav-links { gap: 0.8rem; } .nav-links a { font-size: 0.7rem; } }

  body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #f0f4f8; color: #333; display: flex; justify-content: center; padding: 90px 20px 80px; }
  .main-wrapper { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; }
  .slide-container { background-color: #ffffff; width: 100%; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); padding: 40px; box-sizing: border-box; position: relative; }
  h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
  .instructions { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.95em; }

  .topic-label { background-color: #e2e8f0; color: #4a5568; padding: 5px 10px; border-radius: 4px; font-size: 0.9em; display: inline-block; margin-bottom: 20px; font-weight: bold; }
  
  .slide { display: none; animation: fadeIn 0.4s; }
  .slide.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- フラッシュカードのグリッドレイアウト（10個配置） --- */
  .flashcard-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }

  /* --- 3DフリップカードのCSS --- */
  .flashcard {
    background-color: transparent;
    width: 100%;
    height: 140px;
    perspective: 1000px; 
    cursor: pointer;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }
  .flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  /* 表面（カタカナ） */
  .flashcard-front { background-color: #fff; border: 2px solid #FF9F43; } 
  .flashcard-front .emoji { font-size: 2.2rem; margin-bottom: 5px; }
  .flashcard-front .katakana { font-size: 1.4rem; font-weight: bold; color: #2c3e50; line-height: 1.2; padding: 0 5px;}
  
  /* 裏面（ローマ字・英語） */
  .flashcard-back { background-color: #FF9F43; color: white; transform: rotateY(180deg); padding: 5px;}
  .flashcard-back .romaji { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; letter-spacing: 0.5px;}
  .flashcard-back .english { font-size: 0.85rem; opacity: 0.9; line-height: 1.2;}

  /* ナビゲーションボタン */
  .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 2px solid #e2e8f0; }
  .nav-btn { background-color: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 1em; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
  .nav-btn:hover { background-color: #1a252f; }
  .nav-btn:disabled { background-color: #a0aec0; cursor: not-allowed; }
  .slide-indicator { font-size: 0.9em; color: #718096; align-self: center; font-weight: bold; }
  
  /* --- Support Section --- */
  .support-section { text-align: center; margin-top: 50px; padding-top: 30px; border-top: 2px solid #e2e8f0; width: 100%; }
  .support-section h2 { color: #2c3e50; font-size: 1.2em; margin-bottom: 10px; }
  .support-section p { color: #666; font-size: 0.95em; margin-bottom: 20px; }
  .bmc-custom-btn { display: inline-flex; align-items: center; justify-content: center; background-color: #FFDD00; color: #000; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 1.1em; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
  .bmc-custom-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
  .bmc-custom-btn span { margin-left: 8px; letter-spacing: 0.5px; }

  @media (max-width: 600px) { 
      .slide-container { padding: 30px 20px 50px; } 
      .flashcard-grid { grid-template-columns: repeat(2, 1fr); gap: 15px;}
      .flashcard { height: 130px; }
      .flashcard-front .emoji { font-size: 2rem; }
      .flashcard-front .katakana { font-size: 1.2rem; }
      .flashcard-back .romaji { font-size: 1rem; }
  }
</style>
</head>
<body>

<nav>
    <div class="logo"><a href="https://ohayocenter.com/">OHAYO CENTER</a></div>
    <ul class="nav-links">
        <li><a href="https://ohayocenter.com/#lessons">LESSONS</a></li>
        <li><a href="https://ohayocenter.com/#profile">PROFILE</a></li>
        <li><a href="https://ohayocenter.com/#resources">MATERIAL</a></li>
    </ul>
</nav>

<div class="main-wrapper">
  <div class="slide-container">
    <h1>Katakana Reading Practice</h1>
    <p class="instructions">Click on the card to flip and see the meaning!</p>
    
    <div id="quiz-container"></div>

    <div class="nav-controls">
      <button id="prevBtn" class="nav-btn" onclick="changeSlide(-1)" disabled>← PREV</button>
      <div id="slideIndicator" class="slide-indicator">Slide 1 of 5</div>
      <button id="nextBtn" class="nav-btn" onclick="changeSlide(1)">NEXT →</button>
    </div>

    <div class="support-section">
      <h2>Support OHAYO CENTER</h2>
      <p>If you find these materials helpful, please consider supporting us!</p>
      <a class="bmc-custom-btn" href="https://www.buymeacoffee.com/ohayocenter" target="_blank">
        ☕️ <span>SUPPORT OHAYO CENTER</span>
      </a>
    </div>
  </div>
</div>

<script>
  // 五十音順のカタカナデータ
  const wordData = [
    // Slide 1: ア行、カ行 (10問)
    {
      title: "ア行 (a, i, u, e, o) / カ行 (ka, ki, ku, ke, ko)",
      words: [
        { k: "アイス", r: "aisu", e: "Ice cream", em: "🍨", audio: "" },
        { k: "インク", r: "inku", e: "Ink", em: "🖋️", audio: "" },
        { k: "ウール", r: "ūru", e: "Wool", em: "🧶", audio: "" },
        { k: "エレベーター", r: "erebētā", e: "Elevator", em: "🛗", audio: "" },
        { k: "オートバイ", r: "ōtobai", e: "Motorcycle", em: "🏍️", audio: "" },
        { k: "カメラ", r: "kamera", e: "Camera", em: "📷", audio: "" },
        { k: "キー", r: "kī", e: "Key", em: "🔑", audio: "" },
        { k: "クラス", r: "kurasu", e: "Class", em: "🏫", audio: "" },
        { k: "ケーキ", r: "kēki", e: "Cake", em: "🍰", audio: "" },
        { k: "コイン", r: "koin", e: "Coin", em: "🪙", audio: "" }
      ]
    },
    // Slide 2: サ行、タ行 (10問)
    {
      title: "サ行 (sa, shi, su, se, so) / タ行 (ta, chi, tsu, te, to)",
      words: [
        { k: "サラダ", r: "sarada", e: "Salad", em: "🥗", audio: "" },
        { k: "シャツ", r: "shatsu", e: "Shirt", em: "👕", audio: "" },
        { k: "スキー", r: "sukī", e: "Ski", em: "🎿", audio: "" },
        { k: "セーター", r: "sētā", e: "Sweater", em: "🧥", audio: "" },
        { k: "ソファー", r: "sofā", e: "Sofa", em: "🛋️", audio: "" },
        { k: "タクシー", r: "takushī", e: "Taxi", em: "🚕", audio: "" },
        { k: "チーズ", r: "chīzu", e: "Cheese", em: "🧀", audio: "" },
        { k: "ツアー", r: "tsuā", e: "Tour", em: "🚌", audio: "" },
        { k: "テニス", r: "tenisu", e: "Tennis", em: "🎾", audio: "" },
        { k: "トイレ", r: "toire", e: "Toilet", em: "🚽", audio: "" }
      ]
    },
    // Slide 3: ナ行、ハ行 (10問)
    {
      title: "ナ行 (na, ni, nu, ne, no) / ハ行 (ha, hi, fu, he, ho)",
      words: [
        { k: "ナイフ", r: "naifu", e: "Knife", em: "🍴", audio: "" },
        { k: "ニュース", r: "nyūsu", e: "News", em: "📰", audio: "" },
        { k: "ヌードル", r: "nūdoru", e: "Noodle", em: "🍜", audio: "" },
        { k: "ネクタイ", r: "nekutai", e: "Necktie", em: "👔", audio: "" },
        { k: "ノート", r: "nōto", e: "Notebook", em: "📓", audio: "" },
        { k: "ハンバーガー", r: "hanbāgā", e: "Hamburger", em: "🍔", audio: "" },
        { k: "ヒーロー", r: "hīrō", e: "Hero", em: "🦸", audio: "" },
        { k: "フルーツ", r: "furūtsu", e: "Fruit", em: "🍎", audio: "" },
        { k: "ヘルメット", r: "herumetto", e: "Helmet", em: "⛑️", audio: "" },
        { k: "ホテル", r: "hoteru", e: "Hotel", em: "🏨", audio: "" }
      ]
    },
    // Slide 4: マ行、ヤ行 (10問)
    {
      title: "マ行 (ma, mi, mu, me, mo) / ヤ行 (ya, yu, yo)",
      words: [
        { k: "マスク", r: "masuku", e: "Mask", em: "😷", audio: "" },
        { k: "ミルク", r: "miruku", e: "Milk", em: "🥛", audio: "" },
        { k: "ムーン", r: "mūn", e: "Moon", em: "🌕", audio: "" },
        { k: "メロン", r: "meron", e: "Melon", em: "🍈", audio: "" },
        { k: "モニター", r: "monitā", e: "Monitor", em: "🖥️", audio: "" },
        { k: "ヤング", r: "yangu", e: "Young", em: "🧒", audio: "" },
        { k: "ユーモア", r: "yūmoa", e: "Humor", em: "🤣", audio: "" },
        { k: "ヨーグルト", r: "yōguruto", e: "Yogurt", em: "🥣", audio: "" },
        { k: "シャワー", r: "shawā", e: "Shower", em: "🚿", audio: "" },
        { k: "チョコ", r: "choko", e: "Chocolate", em: "🍫", audio: "" }
      ]
    },
    // Slide 5: ラ行、ワ、ヲ、ン (10問)
    {
      title: "ラ行 (ra, ri, ru, re, ro) / ワ (wa), ヲ (o), ン (n)",
      words: [
        { k: "ライオン", r: "raion", e: "Lion", em: "🦁", audio: "" },
        { k: "リボン", r: "ribon", e: "Ribbon", em: "🎀", audio: "" },
        { k: "ルール", r: "rūru", e: "Rule", em: "📏", audio: "" },
        { k: "レモン", r: "remon", e: "Lemon", em: "🍋", audio: "" },
        { k: "ロボット", r: "robotto", e: "Robot", em: "🤖", audio: "" },
        { k: "ワイン", r: "wain", e: "Wine", em: "🍷", audio: "" },
        { k: "ワンピース", r: "wanpīsu", e: "One-piece dress", em: "👗", audio: "" },
        { k: "サンドイッチ", r: "sandoitchi", e: "Sandwich", em: "🥪", audio: "" },
        { k: "パンツ", r: "pantsu", e: "Pants/Underwear", em: "🩳", audio: "" },
        { k: "オレンジ", r: "orenji", e: "Orange", em: "🍊", audio: "" }
      ]
    }
  ];

  const totalSlides = wordData.length;
  let currentSlide = 1;

  function initApp() {
    const container = document.getElementById('quiz-container');
    
    wordData.forEach((data, index) => {
      const slideNum = index + 1;
      const isActive = slideNum === 1 ? 'active' : '';
      
      let cardsHtml = '';
      data.words.forEach(word => {
        cardsHtml += `
          <div class="flashcard" onclick="flipAndSpeak(this, '${word.audio}')">
            <div class="flashcard-inner">
              <div class="flashcard-front">
                <div class="emoji">${word.em}</div>
                <div class="katakana">${word.k}</div>
              </div>
              <div class="flashcard-back">
                <div class="romaji">${word.r}</div>
                <div class="english">${word.e}</div>
              </div>
            </div>
          </div>
        `;
      });

      const slideHtml = `
        <div id="slide${slideNum}" class="slide ${isActive}">
          <div class="topic-label">${data.title}</div>
          <div class="flashcard-grid">
            ${cardsHtml}
          </div>
        </div>
      `;
      container.innerHTML += slideHtml;
    });
  }

  // 自動音声を削除し、独自音声ファイルが設定された時だけ鳴るように変更
  function flipAndSpeak(cardElement, audioFile) {
    cardElement.classList.toggle('flipped');

    // 表面から裏面になった時だけチェック
    if(cardElement.classList.contains('flipped')) {
        // audioFile（例: "aisu.mp3"）が入力されている場合のみ再生
        if (audioFile && audioFile !== "") {
            const audio = new Audio(audioFile);
            audio.play();
        }
    }
  }

  function changeSlide(direction) {
    document.getElementById('slide' + currentSlide).classList.remove('active');
    currentSlide += direction;
    document.getElementById('slide' + currentSlide).classList.add('active');
    
    document.getElementById('prevBtn').disabled = (currentSlide === 1);
    document.getElementById('nextBtn').disabled = (currentSlide === totalSlides);
    
    document.getElementById('slideIndicator').innerText = `Slide ${currentSlide} of ${totalSlides}`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  window.onload = initApp;

</script>

</body>
</html>
