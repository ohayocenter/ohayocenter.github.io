<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Katakana Practice - OHAYO CENTER</title>
    
    <link rel="icon" href="icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg: #fffafb; --card: #ffffff; --text: #455a64; --accent: #4fc3f7; /* カタカナ版は爽やかなブルー系に調整 */
            --soft: #e1f5fe; --guide: #f5f5f5; --btn-txt: #ffffff;
            --dark: #2c3e50;
            --shadow: 0 10px 30px rgba(79, 195, 247, 0.15);
        }
        body.dark-mode {
            --bg: #1a1a1b; --card: #2d2d2e; --text: #e0e0e0; --accent: #81d4fa;
            --soft: #283a45; --guide: #334155; --dark: #f1f5f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; transition: background 0.3s;
        }

        /* --- NAVIGATION --- */
        nav { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(5px); 
            padding: 0 5%; 
            height: 70px; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            left: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
        }
        body.dark-mode nav { background: rgba(30, 41, 59, 0.95); }
        .logo { font-weight: bold; color: var(--dark); font-size: 1.2rem; }
        .logo a { text-decoration: none; color: inherit; }
        .nav-links { list-style: none; display: flex; gap: 1.2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; font-size: 0.8rem; letter-spacing: 1px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--accent); }

        @media (max-width: 600px) {
            .nav-links { gap: 0.8rem; }
            .nav-links a { font-size: 0.7rem; letter-spacing: 0.5px; }
            .logo { font-size: 1rem; }
        }

        /* --- MAIN CONTENT --- */
        .container {
            flex: 1;
            width: 100%; max-width: 450px;
            padding: 110px 20px 40px; 
            display: flex; flex-direction: column; align-items: center;
        }

        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        h2 { text-align: center; font-size: 1.6rem; margin-bottom: 15px; color: var(--dark); }

        /* Tabs */
        .tab-area { display: flex; gap: 10px; margin-bottom: 25px; width: 100%; }
        .tab-btn {
            flex: 1; padding: 12px; border-radius: 50px; border: 1px solid var(--soft);
            background: var(--card); color: var(--text); font-weight: bold; cursor: pointer;
            font-size: 0.8rem; transition: 0.3s; box-shadow: var(--shadow);
            white-space: nowrap;
        }
        .tab-btn.active { background: var(--accent); color: var(--card); border-color: var(--accent); }

        /* Back Button */
        .back-btn {
            align-self: flex-start; margin-bottom: 15px; color: var(--text);
            font-size: 0.9rem; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; gap: 5px; opacity: 0.7; transition: 0.2s;
        }
        .back-btn:hover { opacity: 1; color: var(--accent); }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
        .row-card {
            background: var(--card); padding: 22px; border-radius: 20px; text-align: center;
            border: 1px solid var(--soft); box-shadow: var(--shadow); cursor: pointer; transition: 0.2s;
        }
        .row-card:active { transform: scale(0.96); }
        .row-name { font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }

        /* Practice Area */
        .info-card {
            width: 100%; background: var(--card); padding: 15px; border-radius: 15px;
            margin-bottom: 20px; border-left: 6px solid var(--accent); box-shadow: var(--shadow);
        }
        .canvas-box {
            position: relative; width: 320px; height: 320px;
            background: var(--card); border-radius: 25px; border: 4px solid var(--soft);
            box-shadow: var(--shadow); overflow: hidden;
        }
        .guide-txt {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 260px; color: var(--guide); pointer-events: none;
            font-family: "YuKyokasho", "Yu Kyokasho", "UD Digi Kyokasho", "HGKyokashotai", sans-serif;
        }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; touch-action: none; }
        
        .num-hint {
            position: absolute; width: 24px; height: 24px; background: var(--accent);
            color: white; border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 13px; font-weight: bold; z-index: 6;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%); 
        }

        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20;
        }
        .opt-btn {
            width: 105px; height: 105px; font-size: 55px; margin: 10px;
            background: var(--bg); border: 2px solid var(--soft); border-radius: 20px;
            color: var(--text); font-family: serif; cursor: pointer; transition: 0.2s;
        }

        .btn-area { margin-top: 25px; display: flex; gap: 12px; width: 320px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: var(--shadow); }
        .btn-main { background: var(--accent); color: var(--btn-txt); }
        .btn-sub { background: #eee; color: #888; }

        /* --- FOOTER --- */
        footer {
            width: 100%; padding: 50px 20px 30px; 
            background: var(--card); border-top: 1px solid var(--soft);
            text-align: center; color: var(--text); font-size: 0.85rem;
        }
        .support-section { margin-bottom: 25px; }
        .bmc-btn {
            display: inline-flex; align-items: center; background-color: #FFDD00;
            color: #000000; border-radius: 12px; padding: 10px 20px;
            text-decoration: none; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .bmc-btn img { height: 22px; margin-right: 10px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            flex-direction: column; justify-content: center; align-items: center; z-index: 200;
        }
        .stamp-card { background: var(--card); padding: 40px; border-radius: 30px; text-align: center; border: 3px solid var(--accent); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        </div>
    </div>
</div>

    </div>
    <p>&copy; 2026 OHAYO CENTER. All Rights Reserved.</p>
</footer>

<div class="overlay" id="overlay">

        'パ行 (Pa)': [
            { c: 'パ', m: 'PA', d: 'ハ', h: [{x:120,y:80,n:1},{x:200,y:80,n:2},{x:260,y:50,n:3}] },
            { c: 'ピ', m: 'PI', d: 'ヒ', h: [{x:90,y:110,n:1},{x:100,y:200,n:2},{x:250,y:50,n:3}] },
            { c: 'プ', m: 'PU', d: 'フ', h: [{x:110,y:100,n:1},{x:240,y:50,n:2}] },
            { c: 'ペ', m: 'PE', d: 'ヘ', h: [{x:100,y:160,n:1},{x:250,y:50,n:2}] },
            { c: 'ポ', m: 'PO', d: 'ホ', h: [{x:100,y:100,n:1},{x:100,y:160,n:2},{x:160,y:60,n:3},{x:120,y:220,n:4},{x:260,y:50,n:5}] }
        ]
    };

    let currentDB = dbBasic;
    let activeRow = []; let charIdx = 0; let drawing = false; let correctIdx = 0;
    const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
    const hCanvas = document.getElementById('h-canvas'); const hCtx = hCanvas.getContext('2d');

    function switchTab(type) {
        currentDB = (type === 'basic') ? dbBasic : dbVoiced;
        document.getElementById('tab-basic').classList.toggle('active', type === 'basic');
        document.getElementById('tab-voiced').classList.toggle('active', type === 'voiced');
        renderMenu();
    }

    function renderMenu() {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        Object.keys(currentDB).forEach(row => {
            const card = document.createElement('div');
            card.className = 'row-card';
            card.innerHTML = `<div class="row-name">${row}</div><div style="font-size:0.8rem; opacity:0.6;">${currentDB[row].map(i => i.c).join('')}</div>`;
            card.onclick = () => startPractice(row);
            grid.appendChild(card);
        });
    }

    function startPractice(rowName) {
        activeRow = currentDB[rowName];
        charIdx = 0;
        document.getElementById('menu').classList.remove('active');
        document.getElementById('practice').classList.add('active');
        window.scrollTo(0,0);
        loadChar();
    }

    function backToMenu() {
        resetCanvas();
        document.getElementById('practice').classList.remove('active');
        document.getElementById('menu').classList.add('active');
        document.getElementById('quiz-overlay').style.display = 'none';
    }

    function loadChar() {
        const item = activeRow[charIdx];
        document.getElementById('guide-char').innerText = item.c;
        document.getElementById('mn-title').innerText = `"${item.c}" for ${item.m}`;
        document.getElementById('quiz-overlay').style.display = 'none';
        const layer = document.getElementById('hints-layer');
        layer.innerHTML = '';
        item.h.forEach(p => {
            const d = document.createElement('div');
            d.className = 'num-hint'; d.style.left = p.x+'px'; d.style.top = p.y+'px';
            d.innerText = p.n; layer.appendChild(d);
        });

        hCtx.clearRect(0,0,320,320); hCtx.fillStyle="black"; hCtx.font="260px 'YuKyokasho', sans-serif";
        hCtx.textAlign="center"; hCtx.textBaseline="middle"; hCtx.shadowBlur = 20; hCtx.shadowColor = "black";
        hCtx.fillText(item.c, 160, 160); hCtx.shadowBlur = 0;
        resetCanvas();
    }

    function judge() {
        const user = ctx.getImageData(0,0,320,320).data;
        const guide = hCtx.getImageData(0,0,320,320).data;
        let hits = 0, total = 0;
        for (let i = 3; i < guide.length; i += 4) {
            if (guide[i] > 20) { total++; if (user[i] > 20) hits++; }
        }
        if (hits/total > 0.08) showQuiz(); else alert("Trace a bit more! / もう少しなぞってね！");
    }

    function showQuiz() {
        const item = activeRow[charIdx];
        document.getElementById('quiz-overlay').style.display = 'flex';
        correctIdx = Math.floor(Math.random() * 2);
        const opts = [document.getElementById('q1'), document.getElementById('q2')];
        opts[correctIdx].innerText = item.c;
        opts[1-correctIdx].innerText = item.d;
    }

    function checkQuiz(choice) {
        if (choice === correctIdx) document.getElementById('overlay').style.display = 'flex';
        else alert("Look closely! / よく見て選んでね！");
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        charIdx++;
        if (charIdx < activeRow.length) loadChar();
        else { alert("Congratulations! Row Completed."); location.reload(); }
    }

    function resetCanvas() {
        ctx.clearRect(0,0,320,320);
        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--text');
        ctx.lineWidth = 18; ctx.lineCap = 'round';
    }

    const getP = (e) => {
        const r = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        return { x: ev.clientX - r.left, y: ev.clientY - r.top };
    };

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); }, {passive:false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive:false});
    canvas.addEventListener('touchend', () => drawing = false);
    canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if(!drawing) return; const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    window.addEventListener('mouseup', () => drawing = false);

    renderMenu();
    resetCanvas();
</script>
</body>
</html>
