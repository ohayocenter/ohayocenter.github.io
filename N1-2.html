</head>

                { s: "【絆】を深めるイベント。", k: "絆", e: "bond", o: ["きずな", "きずな", "ばん"], a: 0 },
                { s: "【協力】してプロジェクトを進める。", k: "協力", e: "cooperation", o: ["きょうりょく", "ごうりょく", "きょうりよく"], a: 0 },
                { s: "【応援】よろしくお願いします。", k: "応援", e: "support / cheering", o: ["おうえん", "おうえん", "おうえ"], a: 0 },
                { s: "【成長】を実感する瞬間。", k: "成長", e: "growth", o: ["せいちょう", "せいじょう", "せいちょう"], a: 0 },
                { s: "【未来】に向かって歩み続ける。", k: "未来", e: "future", o: ["みらい", "みらい", "みれい"], a: 0 },
                { s: "【希望】に満ちた新しい一日。", k: "希望", e: "hope", o: ["きぼう", "きもう", "きぼう"], a: 0 }
            ]
        }
    };

    let current = 1;
    const totalSlides = Object.keys(allData).length;
    // 今回は Part 2 として、新しいキーで進捗を保存します
    let n1ProgressPart2 = JSON.parse(localStorage.getItem('kanji_n1_part2_quiz_v1')) || {};

    function init() {
        const container = document.getElementById('slides-container');
        const navControls = document.getElementById('navControls');
        let totalQuestions = 0;

        for(let i=1; i<=totalSlides; i++){
            totalQuestions += allData[i].words.length;
            const slideDiv = document.createElement('div');
            slideDiv.className = `slide ${i===1?'active':''}`;
            slideDiv.id = `s${i}`;
            
            let gridHTML = `<div class="grid">`;
            allData[i].words.forEach((w, idx) => {
                const saveKey = `${i}_${idx}`;
                const savedResult = n1ProgressPart2[saveKey];
                const isAnswered = savedResult !== undefined;

                let optionsHTML = '';
                w.o.forEach((optText, optIdx) => {
                    const isCorrect = (optIdx === w.a);
                    let resultClass = "";
                    if(isAnswered) {
                        if(isCorrect) resultClass = "correct-ans";
                        else if(savedResult === "wrong" && optIdx === w.lastSelected) resultClass = "wrong-ans";
                    }

                    optionsHTML += `<button class="opt-btn ${resultClass}" data-correct="${isCorrect}" onclick="checkAnswer(this, '${saveKey}', ${optIdx})" ${isAnswered ? 'disabled' : ''}>${optText}</button>`;
                });
                
                const formattedSentence = w.s.replace(/【(.+?)】/g, '<span class="highlight">【$1】</span>');

                gridHTML += `
                    <div class="question-box ${isAnswered ? 'answered-'+savedResult : ''}" id="box-${saveKey}">
                        <div>
                            <div class="sentence"><span>${formattedSentence}</span></div>
                            <span class="kanji">${w.k}</span>
                            <div class="english-container" onclick="this.classList.toggle('show-eng')">
                                <span class="eng-placeholder">English</span>
                                <span class="eng-text">${w.e}</span>
                            </div>
                        </div>
                        <div class="options-container">
                            ${optionsHTML}
                        </div>
                    </div>`;
            });
            gridHTML += `</div>`;
            slideDiv.innerHTML = `<h1>Slide ${i}: ${allData[i].title}</h1>${gridHTML}`;
            container.appendChild(slideDiv);

            const jumpBtn = document.createElement('button');
            jumpBtn.className = `jump-btn ${i===1?'active-page':''}`;
            jumpBtn.id = `btn${i}`;
            jumpBtn.innerHTML = `<span>SLIDE ${i}</span><small id="badge-${i}">0 / ${allData[i].words.length}</small>`;
            jumpBtn.onclick = () => goToSlide(i);
            navControls.appendChild(jumpBtn);
        }
        
        window.totalQuizQuestions = totalQuestions;
        updateUI();
    }

    function checkAnswer(btn, key, optIdx) {
        const isCorrect = btn.dataset.correct === 'true';
        const box = btn.closest('.question-box');
        const allButtons = box.querySelectorAll('.opt-btn');

        n1ProgressPart2[key] = isCorrect ? 'correct' : 'wrong';
        const sIdx = key.split('_')[0];
        const wIdx = key.split('_')[1];
        allData[sIdx].words[wIdx].lastSelected = optIdx;
        
        localStorage.setItem('kanji_n1_part2_quiz_v1', JSON.stringify(n1ProgressPart2));

        allButtons.forEach(b => {
            b.disabled = true;
            if(b.dataset.correct === 'true') b.classList.add('correct-ans');
        });

        if (!isCorrect) {
            btn.classList.add('wrong-ans');
            box.classList.add('answered-wrong');
        } else {
            box.classList.add('answered-correct');
        }
        updateUI();
    }

    function updateUI() {
        let countTotal = Object.keys(n1ProgressPart2).length;
        let percent = Math.round((countTotal / window.totalQuizQuestions) * 100);
        
        document.getElementById('mainBar').style.width = percent + '%';
        document.getElementById('statsOverall').innerText = `Progress: ${countTotal} / ${window.totalQuizQuestions} (${percent}%)`;

        for(let i=1; i<=totalSlides; i++) {
            let sCount = 0;
            allData[i].words.forEach((_, idx) => {
                if(n1ProgressPart2[`${i}_${idx}`] !== undefined) sCount++;
            });
            document.getElementById(`badge-${i}`).innerText = `${sCount} / ${allData[i].words.length}`;
        }
    }

    function goToSlide(slideNum) {
        document.getElementById(`s${current}`).classList.remove('active');
        document.getElementById(`btn${current}`).classList.remove('active-page');
        current = slideNum;
        document.getElementById(`s${current}`).classList.add('active');
        document.getElementById(`btn${current}`).classList.add('active-page');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
        if(confirm("全てのクイズ進捗をリセットしますか？")) {
            localStorage.removeItem('kanji_n1_part2_quiz_v1');
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
