<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4/N5 100 Kanji Quiz | OHAYO CENTER</title>
    <link rel="icon" href="icon.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db; 
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 80px;
        }

        /* --- ナビゲーションバー --- */
        nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); padding: 0 5%; height: 70px; position: fixed; width: 100%; top: 0; left: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .logo { font-family: 'Sawarabi Mincho', serif; font-weight: bold; font-size: 1.2rem; white-space: nowrap; }
        .logo a { text-decoration: none; color: #2c3e50; }
        .nav-links { list-style: none; display: flex; gap: 1.2rem; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #2c3e50; font-weight: 500; font-size: 0.8rem; letter-spacing: 1px; }

        /* プログレスバー */
        .progress-fixed {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            z-index: 999;
        }
        #mainBar { height: 100%; width: 0%; background: var(--correct-color); transition: width 0.4s ease; }

        .container { width: 100%; max-width: 1100px; position: relative; }
        
        .stats-summary {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .slide {
            display: none; background: var(--card-bg); padding: 30px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s;
        }
        .slide.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 {
            text-align: center; color: var(--primary-color); font-size: 1.4rem;
            margin-bottom: 25px; border-bottom: 3px solid var(--accent-color); padding-bottom: 10px;
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 15px; }
        
        .question-box {
            border: 2px solid #edf2f7; padding: 15px 10px; text-align: center;
            border-radius: 12px; background: #fff; display: flex;
            flex-direction: column; justify-content: space-between;
            transition: 0.3s;
        }
        /* 回答済みスタイルの追加 */
        .question-box.answered-correct { border-color: var(--correct-color); background-color: #f0fff4; }
        .question-box.answered-wrong { border-color: var(--wrong-color); background-color: #fff5f5; }

        .kanji { font-size: 1.8rem; font-weight: bold; display: block; color: #333; margin-bottom: 8px; }
        
        .english-container {
            font-size: 0.85rem; margin-bottom: 12px; cursor: pointer;
            min-height: 1.5em; background-color: #f8f9fa; border-radius: 4px;
            padding: 4px 8px; display: inline-block; border: 1px dashed #cbd5e1;
            transition: 0.2s; user-select: none;
        }
        .english-container:hover { background-color: #e2e8f0; }
        .eng-placeholder { color: #94a3b8; font-size: 0.75rem; }
        .eng-text { display: none; color: #34495e; font-weight: bold; }
        .english-container.show-eng { border-style: solid; background-color: #eaf2f8; border-color: #3498db; }
        .english-container.show-eng .eng-placeholder { display: none; }
        .english-container.show-eng .eng-text { display: inline; }
        
        .options-container { display: flex; flex-direction: column; gap: 6px; }
        .opt-btn {
            background-color: #f8f9fa; border: 1px solid #dce1e6;
            padding: 8px; border-radius: 6px; cursor: pointer;
            font-size: 0.9rem; color: #2c3e50; transition: all 0.2s ease;
            width: 100%; font-family: 'Noto Sans JP', sans-serif;
        }
        .opt-btn:hover:not(:disabled) { background-color: #e2e8f0; border-color: #cbd5e1; }
        
        /* 正解・不正解の表示 */
        .opt-btn.correct-ans { background-color: var(--correct-color) !important; color: white !important; border-color: var(--correct-color) !important; }
        .opt-btn.wrong-ans { background-color: var(--wrong-color) !important; color: white !important; border-color: var(--wrong-color) !important; }

        .nav-controls { margin: 30px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .jump-btn {
            background-color: #fff; color: var(--primary-color); border: 2px solid var(--primary-color);
            padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; min-width: 100px;
        }
        .jump-btn small { font-size: 0.65rem; margin-top: 4px; opacity: 0.7; }
        .jump-btn:hover, .jump-btn.active { background-color: var(--primary-color); color: #fff; }

        .support-section { text-align: center; margin-top: 50px; padding-top: 30px; border-top: 2px solid #e2e8f0; width: 100%; }
        .bmc-custom-btn { display: inline-flex; align-items: center; justify-content: center; background-color: #FFDD00; color: #000; padding: 12px 24px; border-radius: 8px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .reset-link { color: #999; font-size: 0.8rem; cursor: pointer; margin-top: 20px; display: block; text-decoration: underline; }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: repeat(2, 1fr); }
            .jump-btn { padding: 8px 12px; font-size: 0.8rem; }
        }
    </style>
</head>

            { k: "喜ぶ", e: "To rejoice", o: ["よろこぷ", "よろこぶ", "よろごぶ"], a: 1 },
            { k: "頼む", e: "To request", o: ["だのむ", "たぬむ", "たのむ"], a: 2 },
            { k: "答える", e: "To answer", o: ["こたえる", "こたい", "こだえ"], a: 0 },
            { k: "急ぐ", e: "To hurry", o: ["いそく", "いぞぐ", "いそぐ"], a: 2 },
            { k: "渡る", e: "To cross", o: ["わたる", "わだる", "わてる"], a: 0 }
        ]},
        3: { title: "Verbs Part 3 (動詞 3)", words: [
            { k: "食べる", e: "To eat", o: ["たべる", "だべる", "たへる"], a: 0 },
            { k: "飲む", e: "To drink", o: ["のぬ", "のむ", "ぬむ"], a: 1 },
            { k: "買う", e: "To buy", o: ["かふ", "かぬ", "かう"], a: 2 },
            { k: "売る", e: "To sell", o: ["おる", "うる", "いる"], a: 1 },

            { k: "探す", e: "To look for", o: ["さがす", "さかす", "ざがす"], a: 0 },
            { k: "見つける", e: "To find", o: ["みづける", "めつける", "見つける"], a: 2 },

            { k: "使う", e: "To use", o: ["つかう", "つふ", "つがう"], a: 0 },
            { k: "切る", e: "To cut", o: ["きる", "くる", "きいる"], a: 0 },
            { k: "洗う", e: "To wash", o: ["あろふ", "あらう", "あろう"], a: 1 },
            { k: "磨く", e: "To polish/brush", o: ["みがく", "みかく", "めがく"], a: 0 },
            { k: "脱ぐ", e: "To take off", o: ["ぬぐ", "ぬく", "のぐ"], a: 0 },
            { k: "着る", e: "To wear", o: ["ける", "きる", "ぎる"], a: 1 },
            { k: "履く", e: "To wear (shoes)", o: ["はぐ", "ばく", "はく"], a: 2 },
            { k: "被る", e: "To wear (hat)", o: ["かぶる", "かぷる", "がぶる"], a: 0 },
            { k: "締める", e: "To tie/fasten", o: ["じめる", "しめる", "しむる"], a: 1 },
            { k: "引く", e: "To pull", o: ["はく", "びく", "ひく"], a: 2 },
            { k: "押す", e: "To push", o: ["おす", "おず", "あす"], a: 0 }
        ]},
        4: { title: "Verbs Part 4 (動詞 4)", words: [
            { k: "開ける", e: "To open (smth)", o: ["はける", "おける", "あける"], a: 2 },
            { k: "閉める", e: "To close (smth)", o: ["じめる", "しめる", "しむる"], a: 1 },
            { k: "開く", e: "To open (itself)", o: ["ひらく", "あぐ", "おく"], a: 0 },
            { k: "閉まる", e: "To be closed", o: ["しまる", "しめる", "じまる"], a: 0 },
            { k: "点ける", e: "To turn on", o: ["つける", "づける", "てける"], a: 0 },
            { k: "消す", e: "To turn off", o: ["げす", "けす", "きす"], a: 1 },
            { k: "貸す", e: "To lend", o: ["かづ", "かす", "がす"], a: 1 },
            { k: "借りる", e: "To borrow", o: ["かりる", "かる", "かいる"], a: 0 },
            { k: "返す", e: "To return (smth)", o: ["かえす", "かえず", "がえす"], a: 0 },
            { k: "送る", e: "To send", o: ["あくる", "おごる", "おくる"], a: 2 },
            { k: "渡す", e: "To hand over", o: ["わたず", "わたす", "わだす"], a: 1 },
            { k: "もらう", e: "To receive", o: ["もろう", "むらう", "もらう"], a: 2 },
            { k: "助ける", e: "To help", o: ["たすける", "だすける", "たずける"], a: 0 },
            { k: "手伝う", e: "To assist", o: ["てつだう", "てつたう", "でつだう"], a: 0 },

            { k: "変わる", e: "To change", o: ["かわる", "がわる", "かえる"], a: 0 },

            { k: "比べる", e: "To compare", o: ["くたべる", "ぐらべる", "くらべる"], a: 2 },
            { k: "調べる", e: "To investigate", o: ["しらべる", "じらべる", "しらへる"], a: 0 },
            { k: "違う", e: "To differ", o: ["ちがう", "ぢがう", "ちかふ"], a: 0 },
            { k: "込む", e: "To be crowded", o: ["こぬ", "ごむ", "こむ"], a: 2 },
            { k: "間に合う", e: "To be in time", o: ["まにあう", "まねあう", "まにあふ"], a: 0 }
        ]}
    };

    let current = 1;
    const totalSlides = Object.keys(allData).length;
    // 学習データをlocalStorageから取得（key: スライド_インデックス, value: correct/wrong）
    let quizProgress = JSON.parse(localStorage.getItem('kanji_quiz_v1')) || {};

    function init() {
        const container = document.getElementById('slides-container');
        const btnContainer = document.getElementById('nav-btns');
        
        for(let i=1; i<=totalSlides; i++){
            // スライド生成
            const slideDiv = document.createElement('div');
            slideDiv.className = `slide ${i===1?'active':''}`;
            slideDiv.id = `s${i}`;
            
            let gridHTML = `<div class="grid">`;
            allData[i].words.forEach((w, idx) => {
                const saveKey = `${i}_${idx}`;
                const savedResult = quizProgress[saveKey];
                const isAnswered = savedResult !== undefined;

                let optionsHTML = '';
                w.o.forEach((optText, optIndex) => {
                    const isCorrect = (optIndex === w.a);
                    let extraClass = "";
                    
                    // すでに回答済みの場合のクラス設定
                    if (isAnswered) {
                        if (isCorrect) extraClass = "correct-ans";
                        else if (savedResult === "wrong" && !isCorrect) {
                            // もし間違えたボタンなら赤くするロジックが必要だが、ここでは簡略化して正解のみ表示
                        }
                    }

                    optionsHTML += `<button class="opt-btn ${extraClass}" data-correct="${isCorrect}" onclick="checkAnswer(this, '${saveKey}')" ${isAnswered ? 'disabled' : ''}>${optText}</button>`;
                });

                gridHTML += `
                    <div class="question-box ${isAnswered ? 'answered-'+savedResult : ''}" id="box-${saveKey}">
                        <div>
                            <span class="kanji">${w.k}</span>
                            <div class="english-container" onclick="this.classList.toggle('show-eng')">
                                <span class="eng-placeholder">English</span>
                                <span class="eng-text">${w.e}</span>
                            </div>
                        </div>
                        <div class="options-container">
                            ${optionsHTML}
                        </div>
                    </div>`;
            });
            gridHTML += `</div>`;
            
            slideDiv.innerHTML = `<h1>Slide ${i}: ${allData[i].title}</h1>${gridHTML}`;
            container.appendChild(slideDiv);

            // ジャンプボタン生成
            const jumpBtn = document.createElement('button');
            jumpBtn.className = `jump-btn ${i===1?'active':''}`;
            jumpBtn.id = `btn${i}`;
            jumpBtn.innerHTML = `<span>SLIDE ${i}</span><small id="badge-${i}">0 / 25</small>`;
            jumpBtn.onclick = () => goToSlide(i);
            btnContainer.appendChild(jumpBtn);
        }
        updateStats();
    }

    function checkAnswer(btn, key) {
        const isCorrect = btn.dataset.correct === 'true';
        const box = btn.closest('.question-box');
        const allButtons = box.querySelectorAll('.opt-btn');

        // 結果を保存
        quizProgress[key] = isCorrect ? 'correct' : 'wrong';
        localStorage.setItem('kanji_quiz_v1', JSON.stringify(quizProgress));

        allButtons.forEach(b => {
            b.disabled = true;
            if(b.dataset.correct === 'true') {
                b.classList.add('correct-ans');
            }
        });

        if (!isCorrect) {
            btn.classList.add('wrong-ans');
            box.classList.add('answered-wrong');
        } else {
            box.classList.add('answered-correct');
        }
        
        updateStats();
    }

    function updateStats() {
        let totalAnswered = Object.keys(quizProgress).length;
        let totalQuestions = 100;
        let percent = Math.round((totalAnswered / totalQuestions) * 100);

        // プログレスバー更新
        document.getElementById('mainBar').style.width = percent + '%';
        document.getElementById('statsOverall').innerText = `Progress: ${totalAnswered} / ${totalQuestions} (${percent}%)`;

        // 各スライドのバッジ更新
        for (let i = 1; i <= totalSlides; i++) {
            let count = 0;
            allData[i].words.forEach((_, idx) => {
                if (quizProgress[`${i}_${idx}`] !== undefined) count++;
            });
            document.getElementById(`badge-${i}`).innerText = `${count} / 25`;
        }
    }

    function goToSlide(slideNum) {
        document.getElementById(`s${current}`).classList.remove('active');
        document.getElementById(`btn${current}`).classList.remove('active');
        current = slideNum;
        document.getElementById(`s${current}`).classList.add('active');
        document.getElementById(`btn${current}`).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetQuiz() {
        if (confirm("Reset all quiz progress?")) {
            localStorage.removeItem('kanji_quiz_v1');
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
